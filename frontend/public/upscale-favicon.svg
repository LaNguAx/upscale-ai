<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="UPscale favicon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070b1a"/>
      <stop offset="100%" stop-color="#0d0f26"/>
    </linearGradient>
    <linearGradient id="gradFilm" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#77f4ff"/>
      <stop offset="52%" stop-color="#2db8ff"/>
      <stop offset="100%" stop-color="#d989ff"/>
    </linearGradient>
    <linearGradient id="gradArrow" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#66ecff"/>
      <stop offset="55%" stop-color="#26b8ff"/>
      <stop offset="100%" stop-color="#b9ffff"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="filmClip">
      <path d="M46 156
               C46 116, 76 92, 118 92
               H166
               C192 92, 210 108, 210 128
               V162
               C210 178, 198 190, 180 190
               H94
               C64 190, 46 176, 46 156 Z"/>
    </clipPath>
  </defs>

  <rect x="8" y="8" width="240" height="240" rx="52" fill="url(#bg)"/>

  <!-- subtle stars -->
  <g fill="#8eefff" opacity="0.95">
    <path d="M192 44 l3 9 9 3 -9 3 -3 9 -3 -9 -9 -3 9 -3z" transform="scale(0.7) translate(90 4)"/>
    <path d="M56 70 l2 6 6 2 -6 2 -2 6 -2 -6 -6 -2 6 -2z" opacity="0.8"/>
    <path d="M204 80 l2 6 6 2 -6 2 -2 6 -2 -6 -6 -2 6 -2z" opacity="0.7"/>
  </g>

  <!-- film strip -->
  <g clip-path="url(#filmClip)">
    <path d="M46 156
             C46 116, 76 92, 118 92
             H166
             C192 92, 210 108, 210 128
             V162
             C210 178, 198 190, 180 190
             H94
             C64 190, 46 176, 46 156 Z"
          fill="url(#gradFilm)" opacity="0.95"/>
    <!-- film top/bottom edges -->
    <path d="M46 149 C56 117, 82 99, 118 99 H166 C188 99, 203 112, 210 129" fill="none" stroke="#10163b" stroke-width="3" opacity="0.35"/>
    <path d="M46 170 C64 182, 77 184, 95 184 H182 C193 184, 202 179, 210 169" fill="none" stroke="#0c1133" stroke-width="3" opacity="0.4"/>
    <!-- sprocket holes top -->
    <g fill="#0d1022">
      <rect x="56" y="104" width="8" height="7" rx="1"/>
      <rect x="72" y="104" width="8" height="7" rx="1"/>
      <rect x="88" y="104" width="8" height="7" rx="1"/>
      <rect x="104" y="104" width="8" height="7" rx="1"/>
      <rect x="120" y="104" width="8" height="7" rx="1"/>
      <rect x="136" y="104" width="8" height="7" rx="1"/>
      <rect x="152" y="104" width="8" height="7" rx="1"/>
      <rect x="168" y="104" width="8" height="7" rx="1"/>
      <rect x="184" y="104" width="8" height="7" rx="1"/>
      <!-- bottom -->
      <rect x="56" y="171" width="8" height="7" rx="1"/>
      <rect x="72" y="171" width="8" height="7" rx="1"/>
      <rect x="88" y="171" width="8" height="7" rx="1"/>
      <rect x="104" y="171" width="8" height="7" rx="1"/>
      <rect x="120" y="171" width="8" height="7" rx="1"/>
      <rect x="136" y="171" width="8" height="7" rx="1"/>
      <rect x="152" y="171" width="8" height="7" rx="1"/>
      <rect x="168" y="171" width="8" height="7" rx="1"/>
      <rect x="184" y="171" width="8" height="7" rx="1"/>
    </g>
  </g>

  <!-- rising arrow -->
  <path d="M76 168
           C106 152, 126 126, 137 96
           L113 96
           L173 42
           L192 118
           L166 106
           C151 138, 122 163, 88 179
           Z"
        fill="url(#gradArrow)" filter="url(#softGlow)"/>

  <!-- highlight -->
  <path d="M84 166
           C110 152, 130 128, 140 100"
        fill="none" stroke="#bfffff" stroke-width="4" stroke-linecap="round" opacity="0.45"/>
</svg>
